<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- %TOKEN% -->
  <title>mudhost</title>
</head>
<body>
  <div class="app">
    <div id="panes-container" class="panes-container"></div>
    <input id="input" type="text" placeholder="Type a command and press Enter">
    <div id="bottom-dock" class="bottom-dock">
      <div class="bottom-toolbar">
        <div class="bottom-toolbar__tabs">
          <button id="panel-toggle-groups" class="panel-tab" type="button" title="Groups panel">
            <span class="panel-tab__icon">☰</span>
            <span class="panel-tab__label">Groups</span>
          </button>
          <button id="panel-toggle-keyboard" class="panel-tab" type="button" title="Keyboard panel">
            <span class="panel-tab__icon">⌨</span>
            <span class="panel-tab__label">Keyboard</span>
          </button>
          <button id="panel-toggle-variables" class="panel-tab" type="button" title="Variables panel">
            <span class="panel-tab__icon">$</span>
            <span class="panel-tab__label">Variables</span>
          </button>
          <button id="btn-open-settings" class="panel-tab" type="button" title="Open Settings">
            <span class="panel-tab__icon">⚙</span>
            <span class="panel-tab__label">Settings</span>
          </button>
        </div>
        <div class="bottom-toolbar__meta">
          <div id="secondary-timers" class="secondary-timers"></div>
          <span id="ticker" class="ticker">tick off</span>
          <span id="bottom-toolbar-hint" class="bottom-toolbar__hint">Panels</span>
          <span id="connection-status">connecting</span>
        </div>
      </div>
      <div id="bottom-panels" class="bottom-panels">
        <div id="panel-groups" class="bottom-panel">
          <div class="panel-section">
            <div id="groups-list" class="groups-list"></div>
          </div>
        </div>
        <div id="panel-keyboard" class="bottom-panel">
          <div class="panel-section">
            <div id="hotkeys"></div>
          </div>
        </div>
        <div id="panel-variables" class="bottom-panel">
          <div class="panel-section">
            <div id="variables-list" class="variables-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
